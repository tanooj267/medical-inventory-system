<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Inventory Item</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card border-danger">
                    <div class="card-header bg-danger text-white">
                        <h4 class="mb-0">Delete Inventory Item</h4>
                    </div>
                    <div class="card-body">
                        <!-- Error/Success Messages -->
                        {% if error %}
                        <div class="alert alert-danger alert-dismissible fade show">
                            {{ error }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        {% endif %}
                        
                        {% if success %}
                        <div class="alert alert-success alert-dismissible fade show">
                            {{ success }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        {% endif %}

                        <!-- Delete Form -->
                        <form method="POST" action="/delete_inventory">
                            <div class="mb-3">
                                <label for="item_id" class="form-label">Item ID to Delete</label>
                                <input type="number" class="form-control" id="item_id" name="item_id" 
                                       required min="1" placeholder="Enter item ID">
                            </div>
                            
                            <div class="d-flex justify-content-between">
                                <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
                                <button type="submit" class="btn btn-danger">Confirm Delete</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
