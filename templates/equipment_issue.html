<!DOCTYPE html>
<html>
<head>
<title>Issue Equipment</title>

<style>

body{
    font-family: Arial, sans-serif;
    background-color:#f4f6f9;
    margin:0;
    padding:0;
}

.container{
    width:400px;
    margin:80px auto;
    background:white;
    padding:30px;
    border-radius:8px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    margin-bottom:25px;
}

form{
    display:flex;
    flex-direction:column;
}

label{
    font-weight:bold;
    margin-top:10px;
}

input{
    padding:8px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:4px;
}

button{
    margin-top:20px;
    padding:10px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:4px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

</style>

</head>

<body>

<div class="container">

<h2>Issue Equipment</h2>

<form method="POST">

<label>Equipment Name:</label>
<input type="text" name="equipment_name" required>

<label>Doctor ID:</label>
<input type="number" name="doctor_id" required>

<label>Quantity Needed:</label>
<input type="number" name="equipment_needed" required>

<button type="submit">Issue Equipment</button>

</form>

</div>

</body>
</html>
